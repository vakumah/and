name: macOS AnyDesk Remote

on: workflow_dispatch

jobs:
  anydesk:
    runs-on: macos-latest
    steps:
      - name: Download & Install AnyDesk
        run: |
          curl -L -o AnyDesk.dmg https://download.anydesk.com/anydesk.dmg
          hdiutil attach AnyDesk.dmg
          sudo cp -r /Volumes/AnyDesk/AnyDesk.app /Applications/
          hdiutil detach /Volumes/AnyDesk

      - name: Start AnyDesk & Get ID
        run: |
          # Jalankan AnyDesk di background
          /Applications/AnyDesk.app/Contents/MacOS/AnyDesk --service &
          sleep 5
          
          # Dapatkan ID
          ID=$(/Applications/AnyDesk.app/Contents/MacOS/AnyDesk --get-id)
          
          # Set password
          /Applications/AnyDesk.app/Contents/MacOS/AnyDesk --set-password rahasia123
          
          echo "=================================================="
          echo "✅ AnyDesk siap!"
          echo "🔑 ID Remote: $ID"
          echo "🔒 Password: rahasia123"
          echo "🌐 Download AnyDesk di Android dari Play Store"
          echo "📱 Buka AnyDesk, masukkan ID dan password"
          echo "=================================================="
          sleep 6h &
          wait $!
