name: macOS VNC via bore.pub

on: workflow_dispatch

jobs:
  vnc-tunnel:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Aktifkan VNC Server
        run: |
          # Aktifkan Remote Management (VNC)
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -activate -configure -access -on \
            -clientopts -setvnclegacy -vnclegacy yes \
            -restart -agent -menu

          # Set password VNC (ganti 'password-kamu' dengan password pilihanmu)
          echo "password-kamu" | perl -we 'BEGIN { @k = unpack "C*", pack "H*", "1734516E8BA8C5E2FF1C39567390ADCA" }; $_ = <>; chomp; s/^(.{8}).*/$1/; @p = unpack "C*", $_; foreach (@k) { printf "%02X", $_ ^ (shift @p || 0) }; print "\n"' | sudo tee /Library/Preferences/com.apple.VNCSettings.txt

          # Restart service
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart -restart -agent

      - name: Setup bore tunnel manual
        run: |
          # Buat direktori kerja
          mkdir -p /tmp/bore

          # Unduh bore binary untuk arm64 macOS
          curl -L https://github.com/ekzhang/bore/releases/download/v0.4.0/bore-v0.4.0-aarch64-apple-darwin.tar.gz -o /tmp/bore/bore.tar.gz
          tar -xzf /tmp/bore/bore.tar.gz -C /tmp/bore
          chmod +x /tmp/bore/bore

          # Jalankan bore di background, arahkan output ke file log
          /tmp/bore/bore local 5900 --to bore.pub > /tmp/bore/bore.log 2>&1 &
          BORE_PID=$!
          echo "Bore PID: $BORE_PID"

          # Tunggu hingga bore memberikan info port (maks 30 detik)
          timeout=30
          while [ $timeout -gt 0 ]; do
            if grep -q "listening at" /tmp/bore/bore.log; then
              break
            fi
            sleep 1
            timeout=$((timeout-1))
          done

          if [ $timeout -eq 0 ]; then
            echo "Gagal mendapatkan tunnel dalam 30 detik"
            exit 1
          fi

          # Ekstrak port dari log
          PORT=$(grep -o 'bore\.pub:[0-9]*' /tmp/bore/bore.log | head -1 | cut -d':' -f2)
          echo "✅ Tunnel tersedia di: bore.pub:$PORT"
          echo "BORE_PORT=$PORT" >> $GITHUB_ENV

          # Tampilkan instruksi
          echo ""
          echo "=================================================="
          echo "Koneksikan VNC client kamu ke: bore.pub:$PORT"
          echo "Password VNC: password-kamu (sesuai yang diset)"
          echo "=================================================="
          echo ""

          # Jaga job tetap hidup selama 6 jam (maksimum GitHub Actions)
          echo "Menjaga tunnel tetap aktif selama 6 jam..."
          sleep 6h &
          wait $!
