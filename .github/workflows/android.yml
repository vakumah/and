name: macOS NoMachine Remote Desktop

on: workflow_dispatch

jobs:
  nomachine:
    runs-on: macos-latest
    steps:
      - name: Download & Install NoMachine
        run: |
          curl -L -o nomachine.dmg https://download.nomachine.com/download/8.14/MacOSX/NoMachine-8.14.2.dmg
          hdiutil attach nomachine.dmg -nobrowse
          sudo cp -r /Volumes/NoMachine/NoMachine.app /Applications/
          hdiutil detach /Volumes/NoMachine

      - name: Start NoMachine Server
        run: |
          # Jalankan server
          sudo /Applications/NoMachine.app/Contents/MacOS/nxserver --start
          sleep 5
          
          # Set password (ganti '123456' dengan PIN pilihanmu)
          sudo /Applications/NoMachine.app/Contents/MacOS/nxserver --userpasswd runner:123456
          
          # Dapatkan IP lokal
          IP=$(ifconfig | grep inet | grep -v 127.0.0.1 | head -1 | awk '{print $2}')
          
          echo "=================================================="
          echo "✅ NoMachine siap digunakan!"
          echo "🔌 IP Address: $IP"
          echo "🔑 Port: 4000 (default)"
          echo "🔑 Username: runner"
          echo "🔑 Password: 123456"
          echo ""
          echo "📱 Dari Android:"
          echo "   1. Install NoMachine dari Play Store"
          echo "   2. Buka app, klik '+', masukkan IP $IP"
          echo "   3. Login dengan username/password di atas"
          echo ""
          echo "⚠️ BUTUH TUNNEL: Karena IP di atas IP lokal, kamu perlu tunnel"
          echo "   Gunakan bore atau ngrok untuk port 4000"
          echo "=================================================="

      - name: Setup bore tunnel untuk NoMachine
        run: |
          # Download bore
          curl -L https://github.com/ekzhang/bore/releases/download/v0.4.0/bore-v0.4.0-aarch64-apple-darwin.tar.gz -o bore.tar.gz
          tar -xzf bore.tar.gz
          chmod +x bore
          
          # Jalankan tunnel untuk port 4000 (NoMachine)
          ./bore local 4000 --to bore.pub > bore.log 2>&1 &
          sleep 5
          
          PORT=$(grep -o 'bore\.pub:[0-9]*' bore.log | head -1 | cut -d':' -f2)
          
          echo "=================================================="
          echo "🌐 Tunnel tersedia di: bore.pub:$PORT"
          echo "📱 Di Android, masukkan alamat: bore.pub:$PORT"
          echo "   Username: runner, Password: 123456"
          echo "=================================================="
          
          sleep 6h &
          wait $!
