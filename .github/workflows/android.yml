name: macOS Rustdesk Remote

on: workflow_dispatch

jobs:
  rustdesk:
    runs-on: macos-latest
    steps:
      - name: Download & Install Rustdesk
        run: |
          # Unduh Rustdesk untuk macOS (ARM64)
          curl -L -o rustdesk.dmg https://github.com/rustdesk/rustdesk/releases/download/1.2.3/rustdesk-1.2.3-aarch64.dmg
          hdiutil attach rustdesk.dmg
          sudo cp -r /Volumes/RustDesk/RustDesk.app /Applications/
          hdiutil detach /Volumes/RustDesk

      - name: Jalankan Rustdesk Headless
        run: |
          # Ganti password sesuai keinginan (minimal 6 karakter)
          PASSWORD="rahasia123"

          # Jalankan service Rustdesk di background
          /Applications/RustDesk.app/Contents/MacOS/RustDesk --service --password "$PASSWORD" &
          
          # Tunggu hingga service siap
          sleep 10

          # Baca file ID (lokasi default)
          ID_FILE="$HOME/Library/Application Support/rustdesk/config/ID"
          if [ -f "$ID_FILE" ]; then
            ID=$(cat "$ID_FILE")
          else
            ID="(ID belum tergenerate, cek log)"
          fi

          echo "=================================================="
          echo "✅ Rustdesk siap digunakan!"
          echo "🔑 ID Remote: $ID"
          echo "🔒 Password: $PASSWORD"
          echo "🌐 Download client di: https://rustdesk.com/"
          echo "📱 Konek menggunakan ID dan password di atas"
          echo ""
          echo "⏳ Job akan berjalan maksimal 6 jam."
          echo "   Tekan Ctrl+C di log untuk menghentikan lebih awal."
          echo "=================================================="

          # Jaga job tetap hidup
          sleep 6h &
          wait $!
