name: macOS dengan VNC dan bore.pub

on: workflow_dispatch # Memungkinkan kamu menjalankan workflow secara manual

jobs:
  build:
    runs-on: macos-latest # Menjalankan di runner macOS

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Aktifkan VNC Server
        run: |
          # Mengaktifkan Remote Management (VNC)
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -activate -configure -access -on \
            -clientopts -setvnclegacy -vnclegacy yes \
            -restart -agent -menu
          
          # Mengatur password VNC (ganti 'password-kamu' dengan password yang kuat)
          echo "password-kamu" | perl -we 'BEGIN { @k = unpack "C*", pack "H*", "1734516E8BA8C5E2FF1C39567390ADCA" }; $_ = <>; chomp; s/^(.{8}).*/$1/; @p = unpack "C*", $_; foreach (@k) { printf "%02X", $_ ^ (shift @p || 0) }; print "\n"' | sudo tee /Library/Preferences/com.apple.VNCSettings.txt
          
          # Memulai ulang service agar perubahan diterapkan
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart -restart -agent
        shell: bash

      - name: Buat Tunnel dengan bore.pub
        uses: codetalkio/expose-tunnel@v1.5.0
        id: expose-tunnel
        with:
          service: bore.pub   # Menggunakan layanan bore.pub
          port: 5900          # Port VNC default
          blocking: 180m      # Jaga tunnel tetap hidup selama 3 jam (maks 120m atau 30m? Sesuaikan, dokumentasi menyebut 30m tapi parameter menerima 180m. Sebaiknya 30m atau 120m)

      - name: Tampilkan URL Tunnel
        run: |
          echo "Tunnel VNC telah dibuat!"
          echo "Koneksikan VNC client kamu ke: ${{ steps.expose-tunnel.outputs.tunnel-url }}"
          echo "Gunakan password VNC yang sudah kamu atur di langkah sebelumnya."
          
          # Menjaga job tetap berjalan agar tunnel tidak mati
          # Ini penting karena step expose-tunnel di atas sudah 'blocking' selama 30 menit.
          # Setelah 30 menit, workflow akan lanjut ke step ini. Kita buat loop agar tetap hidup.
          # Catatan: Total waktu hidup maksimal runner GitHub Actions adalah 6 jam.
          echo "Workflow akan berjalan selama 6 jam. Tekan Ctrl+C untuk menghentikannya lebih awal di log."
          while true; do
            sleep 3600
          done
        shell: bash
