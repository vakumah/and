name: macOS Rustdesk Remote (Android Compatible)

on: workflow_dispatch

jobs:
  rustdesk:
    runs-on: macos-latest
    steps:
      - name: Download & Install Rustdesk
        run: |
          # Unduh Rustdesk untuk macOS (ARM64)
          curl -L -o rustdesk.dmg https://github.com/rustdesk/rustdesk/releases/download/1.2.3/rustdesk-1.2.3-aarch64.dmg
          hdiutil attach rustdesk.dmg -nobrowse
          
          # Cari folder volume yang dimount (biasanya /Volumes/rustdesk-*)
          VOLUME_PATH=$(ls -d /Volumes/rustdesk-* | head -1)
          echo "Volume ter-mount di: $VOLUME_PATH"
          
          # Salin aplikasi ke /Applications
          sudo cp -r "$VOLUME_PATH/RustDesk.app" /Applications/
          
          # Unmount volume
          hdiutil detach "$VOLUME_PATH"

      - name: Jalankan Rustdesk Headless
        run: |
          # Ganti password sesuai keinginan (minimal 6 karakter)
          PASSWORD="rahasia123"
          
          # Hapus konfigurasi lama jika ada (agar fresh)
          rm -rf "$HOME/Library/Application Support/rustdesk"
          
          # Jalankan service Rustdesk di background
          echo "Menjalankan RustDesk service..."
          /Applications/RustDesk.app/Contents/MacOS/RustDesk --service --password "$PASSWORD" &
          RUSTDESK_PID=$!
          
          # Tunggu hingga proses menghasilkan file ID (maks 60 detik)
          echo "Menunggu file ID tergenerate..."
          ID=""
          for i in {1..60}; do
            # Cek di lokasi umum
            if [ -f "$HOME/Library/Application Support/rustdesk/config/ID" ]; then
              ID=$(cat "$HOME/Library/Application Support/rustdesk/config/ID")
              break
            fi
            # Cek juga di lokasi alternatif
            if [ -f "$HOME/.config/rustdesk/config/ID" ]; then
              ID=$(cat "$HOME/.config/rustdesk/config/ID")
              break
            fi
            sleep 1
          done
          
          # Jika masih tidak ditemukan, coba dengan find
          if [ -z "$ID" ]; then
            echo "Mencari file ID dengan find..."
            ID_FILE=$(find "$HOME" -name "ID" -path "*/rustdesk/config/ID" 2>/dev/null | head -1)
            if [ -n "$ID_FILE" ]; then
              ID=$(cat "$ID_FILE")
            fi
          fi
          
          # Tampilkan hasil
          echo "=================================================="
          echo "✅ Rustdesk siap digunakan!"
          if [ -n "$ID" ]; then
            echo "🔑 ID Remote: $ID"
          else
            echo "🔑 ID Remote: (TIDAK DITEMUKAN - coba jalankan ulang)"
            echo "   Proses mungkin masih memuat, cek dengan: ps aux | grep RustDesk"
          fi
          echo "🔒 Password: $PASSWORD"
          echo "🌐 Download client Android di: https://rustdesk.com/"
          echo "📱 Buka RustDesk di Android, masukkan ID dan password di atas"
          echo ""
          echo "⏳ Job akan berjalan maksimal 6 jam."
          echo "   Tekan Ctrl+C di log untuk menghentikan lebih awal."
          echo "=================================================="
          
          # Jaga job tetap hidup
          sleep 6h &
          wait $!
