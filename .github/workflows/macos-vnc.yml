name: macOS VNC - BORE
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 9999

    steps:
      - name: Install Bore
        run: |
          echo "Mencari versi Bore terbaru..."
          ARCH=$(uname -m)
          if [ "$ARCH" = "arm64" ]; then TARGET="aarch64-apple-darwin"; else TARGET="x86_64-apple-darwin"; fi
          
          DOWNLOAD_URL=$(curl -s https://api.github.com/repos/ekzhang/bore/releases/latest | grep "browser_download_url.*bore-.*-$TARGET.tar.gz" | cut -d '"' -f 4)
          
          echo "Mengunduh dari: $DOWNLOAD_URL"
          curl -L $DOWNLOAD_URL -o bore.tar.gz
          tar -xzf bore.tar.gz
          chmod +x bore
          sudo mv bore /usr/local/bin/
          
          echo "✅ Bore Installed!"
          bore --version

      - name: Enable VNC/Screen Sharing
        run: |
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart -activate -configure -access -on -restart -agent -privs -all -allowAccessFor -allUsers
          sudo defaults write /var/db/launchd.db/com.apple.launchd/overrides.plist com.apple.screensharing -dict Disabled -bool false
          echo "✅ VNC Enabled!"

      - name: Set VNC Password (Legacy VNC)
        shell: bash
        run: |
          set -e
          sudo mkdir -p /Library/Preferences
          
          echo "P@ssw0rd123!" | sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -activate -configure -access -on -restart -agent -privs -all \
            -clientopts -setvnclegacy -vnclegacy yes -setvncpw -vncpw P@ssw0rd123!
            
          sudo /usr/libexec/PlistBuddy -c "Add :VNCLegacyPasswords array" /Library/Preferences/com.apple.RemoteManagement.plist 2>/dev/null || true
          sudo /usr/libexec/PlistBuddy -c "Delete :VNCLegacyPasswords:0" /Library/Preferences/com.apple.RemoteManagement.plist 2>/dev/null || true
          
          HASH=$(python3 -c 'import hashlib; print(hashlib.md5(b"P@ssw0rd123!").hexdigest())')
          
          sudo /usr/libexec/PlistBuddy -c "Add :VNCLegacyPasswords:0 data $(echo $HASH | xxd -r -p | base64)" /Library/Preferences/com.apple.RemoteManagement.plist
          sudo launchctl unload /System/Library/LaunchDaemons/com.apple.screensharing.plist 2>/dev/null || true
          sudo launchctl load -w /System/Library/LaunchDaemons/com.apple.screensharing.plist
          echo "✅ VNC Password Set!"

      - name: Start Bore Tunnel
        run: |
          echo "============================================"
          echo "🚀 macOS VNC - BORE TUNNEL"
          echo "============================================"
          echo ""
          
          # Menjalankan bore di background untuk port 5900 (VNC)
          bore local 5900 --to bore.network > tunnel.log 2>&1 &
          
          # Tunggu sebentar agar bore selesai melakukan koneksi
          sleep 5
          
          # Mengekstrak port public dari log bore
          BORE_PORT=$(cat tunnel.log | grep -Eo 'bore.network:[0-9]+' | cut -d':' -f2 | head -n 1)
          
          if [ -z "$BORE_PORT" ]; then
            echo "❌ Gagal mendapatkan port Bore. Berikut adalah lognya:"
            cat tunnel.log
          else
            echo "✅ TUNNEL STARTED!"
            echo ""
            echo "📋 CONNECTION DETAILS:"
            echo "   VNC SERVER: bore.network:$BORE_PORT"
            echo "   PASSWORD  : P@ssw0rd123!"
            echo "   OS        : macOS (Architecture: $(uname -m))"
            echo "============================================"
            echo "💡 Buka aplikasi VNC Viewer (seperti RealVNC atau TigerVNC)"
            echo "💡 Masukkan address di atas pada kolom koneksi."
          fi

      - name: Keep Session Alive
        run: |
          echo "⏳ Session Active - Keeping alive..."
          while true; do
            sleep 60
            echo "✓ Active - $(date '+%H:%M:%S')"
          done
          
